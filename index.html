<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body{
 margin:0;
 background:black;
 color:white;
 font-family:monospace;
 overflow:hidden;
}

.container{
 width:90%;
 margin:auto;
 padding-top:40px;
}

.box{
 padding:20px;
 border:1px solid white;
 margin:10px 0;
 opacity:0.3;
 cursor:pointer;
 transition:0.4s;
}
.box.active{opacity:1}

/* screens */
.screen{
 position:fixed;
 top:0;left:0;
 width:100%;
 height:100%;
 background:black;
 display:none;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 text-align:center;
}

/* heart */
#heart{
 position:absolute;
 width:80px;
 height:80px;
 background:red;
 transform:rotate(-45deg);
 cursor:grab;
 box-shadow:0 0 25px red;
 animation:beat 1s infinite;
}

#heart::before,#heart::after{
 content:'';
 position:absolute;
 width:80px;
 height:80px;
 background:red;
 border-radius:50%;
}
#heart::before{top:-40px;}
#heart::after{left:40px;}

@keyframes beat{
 0%{transform:rotate(-45deg) scale(1);}
 50%{transform:rotate(-45deg) scale(1.1);}
 100%{transform:rotate(-45deg) scale(1);}
}

canvas{
 background:black;
}
</style>
</head>

<body>

<div class="container">
<div class="box active" onclick="openScreen(1)">Connect the stars ⭐</div>
<div class="box" id="b2">When is my birthday?</div>
<div class="box" id="b3">Who's my bbsf?</div>
<div class="box" id="b4">Hold my heart 🫀</div>
<div class="box" id="b5">Another reality 🌌</div>
<div class="box" id="b6">Break it 🔥</div>
<div class="box" id="b7">Final 🌹</div>
</div>

<!-- ⭐ STARS -->
<div class="screen" id="s1">
<canvas id="stars" width="300" height="400"></canvas>
<button onclick="finishStars()">Continue</button>
</div>

<!-- 🎂 -->
<div class="screen" id="s2">
<h2>When is my birthday?</h2>
<input id="bday">
<button onclick="checkBday()">Submit</button>
</div>

<!-- 👤 -->
<div class="screen" id="s3">
<h2>Who's my bbsf?</h2>
<input id="name">
<button onclick="checkName()">Submit</button>
</div>

<!-- 🫀 -->
<div class="screen" id="s4">
<div id="heart"></div>
<p id="timer">10</p>
</div>

<!-- 💔 -->
<div class="screen" id="fail">
<h1>u broke my heart</h1>
<button onclick="location.reload()">Restart</button>
</div>

<!-- 🌌 -->
<div class="screen" id="s5">
<h2>we were okay...</h2>
<button onclick="next6()">Continue</button>
</div>

<!-- 🔥 -->
<div class="screen" id="s6">
<button onclick="next7()">Break</button>
</div>

<!-- 🌹 -->
<div class="screen" id="s7">
<h2>Do you feel it too?</h2>
<button onclick="yes()">Yes</button>
<button onclick="no()">No</button>
</div>

<!-- ❌ -->
<div class="screen" id="noScreen">
<h1>Then why are u still here?</h1>
<button onclick="location.reload()">Restart</button>
</div>

<!-- AUDIO -->
<audio id="song" src="sounds/HIM - Join Me In Death.mp3"></audio>
<audio id="vintage" src="sounds/Film Projector Start Sound Effect.mp3"></audio>
<audio id="whisper" src="sounds/Four Voices Whispering _ Horror Film Sound Effects.mp3"></audio>
<audio id="heartbeat" src="sounds/Heart Beat [SOUND EFFECT].mp3"></audio>
<audio id="glitch" src="sounds/Glitch Sound Effect.mp3"></audio>
<audio id="glass" src="sounds/Glass Breaking Sound Effect HD Glass Shattering Sound Effect.mp3"></audio>
<audio id="piano" src="sounds/Low Sad Melody Sound Effect Emotional Piano Rebuil.mp3"></audio>

<script>

/* open screen */
function openScreen(n){
 document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
 document.getElementById("s"+n).style.display="flex";

 if(n==2) vintage.play();
 if(n==3) whisper.play();
 if(n==5) glitch.play();
 if(n==6) glass.play();
 if(n==7) piano.play();
}

/* ⭐ stars */
let c=document.getElementById("stars");
let ctx=c.getContext("2d");

let pts=[
{x:50,y:100},{x:250,y:100},
{x:150,y:200},{x:80,y:300},{x:220,y:300}
];

let cur=0;

function draw(){
 ctx.clearRect(0,0,300,400);

 pts.forEach(p=>{
  ctx.beginPath();
  ctx.fillStyle="white";
  ctx.arc(p.x,p.y,5,0,6.28);
  ctx.fill();
 });

 if(cur>0){
  ctx.beginPath();
  ctx.strokeStyle="white";
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<cur;i++){
    ctx.lineTo(pts[i].x,pts[i].y);
  }
  ctx.stroke();
 }
}

window.onload=draw;

c.onclick=()=>{
 if(cur<pts.length){
  cur++;
  draw();
 }
}

function finishStars(){
 if(cur===pts.length){
  document.getElementById("song").play();
  document.getElementById("s1").style.display="none";

  document.getElementById("b2").classList.add("active");
  document.getElementById("b2").onclick=()=>openScreen(2);
 }
}

/* 🎂 */
function checkBday(){
 let v=bday.value.toLowerCase();
 if(v.includes("1")){
  openScreen(3);
 }
}

/* 👤 */
function checkName(){
 let v=name.value.toLowerCase();
 if(v.includes("سيف")||v.includes("seif")||v.includes("saif")){
  openScreen(4);
 }
}

/* 🫀 heart */
let heart=document.getElementById("heart");
let drag=false,started=false,time=10;

heart.onmousedown=()=>{
 drag=true;
 if(!started){
  heartbeat.play();
  startTimer();
  started=true;
 }
};

document.onmouseup=()=>drag=false;

document.onmousemove=(e)=>{
 if(drag){
  heart.style.left=e.clientX+"px";
  heart.style.top=e.clientY+"px";
 }
};

function startTimer(){
 let int=setInterval(()=>{
  time--;
  timer.innerText=time;

  if(time<=0){
   clearInterval(int);
   openScreen(5);
  }
 },1000);
}

setInterval(()=>{
 if(!drag){
  let t=parseInt(heart.style.top||100);
  heart.style.top=(t+5)+"px";

  if(t>window.innerHeight){
   document.getElementById("fail").style.display="flex";
  }
 }
},40);

/* rest */
function next6(){openScreen(6);}
function next7(){openScreen(7);}

/* typing */
function type(text,el){
 let i=0;
 let int=setInterval(()=>{
  el.innerHTML+=text[i];
  i++;
  if(i>=text.length) clearInterval(int);
 },20);
}

function yes(){
 document.body.innerHTML="<div id='msg' style='padding:20px;max-width:700px;margin:auto;line-height:2;text-align:left'></div>";
 document.getElementById("piano").play();

 let msg=`بما انك اخترت ”ايوة“، فا ديه هتبقى هابي ماسدج عسولة زيك، ليككك مش لحد غيرك ❤️

أنتَ الكمالُ إذا تجلّى نورهُ  
وإذا حضرتَ، توارى النقصُ خجلانَا  
فيك الجمالُ كأنّه متجسّدٌ  
حتى ظننتُ الحسنَ فيك أوطانَا

وجهٌ أراكَ به، وقلبٌ ما هَوانَا، يا سيفُ قلبي، أترىٰ هيامي ؟

 type(msg,document.getElementById("msg"));
}

function no(){
 document.getElementById("noScreen").style.display="flex";
}

</script>

</body>
</html>
