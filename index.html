<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body{
 margin:0;
 background:linear-gradient(135deg,#2b001f,#5a0f3d,#8a1c5a);
 color:white;
 font-family:monospace;
}

/* 3D BOX */
.box{
 padding:20px;
 margin:12px;
 background:#1a0012;
 border:1px solid #ff4da6;
 box-shadow:0 8px #660033;
 cursor:pointer;
 transition:0.1s;
 opacity:0.4;
 border-radius:12px;
}
.box.active{opacity:1}
.box:active{
 transform:translateY(8px);
 box-shadow:0 0 #660033;
}

.screen{
 display:none;
 position:fixed;
 width:100%;
 height:100%;
 top:0;
 left:0;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

canvas{border:1px solid white;}

input,button{
 padding:10px;
 margin:10px;
 background:black;
 color:white;
 border:1px solid #ff4da6;
}

audio{margin-top:20px;}

/* قلب */
#heart{
 position:absolute;
 width:90px;
 height:90px;
 background:red;
 transform:translate(-50%,-50%) rotate(-45deg);
 left:50%;
 top:50%;
 cursor:grab;
}
#heart:before,#heart:after{
 content:'';
 position:absolute;
 width:90px;
 height:90px;
 background:red;
 border-radius:50%;
}
#heart:before{top:-45px;}
#heart:after{left:45px;}
</style>
</head>

<body>

<!-- الخانات -->
<div class="box active" onclick="openScreen(1)">Connect the stars ⭐</div>
<div class="box" id="b2">Birthday 🎂</div>
<div class="box" id="b3">Who's my bbsf 👤</div>
<div class="box" id="b4">Hold me 🫀</div>
<div class="box" id="b5">Memory 🌌</div>
<div class="box" id="b6">Break 💔</div>
<div class="box" id="b7">Final 🌹</div>

<!-- ⭐ -->
<div class="screen" id="s1">
<canvas id="stars" width="400" height="500"></canvas>
<button onclick="finishStars()">Continue</button>

<audio id="song" controls style="display:none">
<source src="HIM - Join Me In Death.mp3" type="audio/mpeg">
</audio>
</div>

<!-- 🎂 -->
<div class="screen" id="s2">
<input id="bday" placeholder="When is my birthday?">
<button onclick="checkBday()">ok</button>
</div>

<!-- 👤 -->
<div class="screen" id="s3">
<input id="name" placeholder="Who's my bbsf?">
<button onclick="checkName()">ok</button>
</div>

<!-- 🫀 -->
<div class="screen" id="s4">
<div id="heart"></div>
<p id="timer">10</p>
</div>

<!-- 🌌 -->
<div class="screen" id="s5">
<h2>we were something special...</h2>
<button onclick="next6()">Continue</button>
</div>

<!-- 💔 -->
<div class="screen" id="s6">
<h2>sometimes things break...</h2>
<button onclick="next7()">Continue</button>
</div>

<!-- 🌹 -->
<div class="screen" id="s7">
<button onclick="yes()">Open 💌</button>
</div>

<script>

/* فتح */
function openScreen(n){
 document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
 document.getElementById("s"+n).style.display="flex";

 if(n==1) setTimeout(initStars,100);
 if(n==4) setTimeout(initHeart,100);
}

/* ⭐ النجوم */
let pts=[{x:80,y:120},{x:320,y:120},{x:200,y:230},{x:100,y:380},{x:300,y:380}];
let cur=0,ctx;

function initStars(){
 let c=document.getElementById("stars");
 ctx=c.getContext("2d");
 draw();

 c.onclick=()=>{
  if(cur<pts.length){
   cur++;
   draw();
  }
 };
}

function draw(){
 ctx.clearRect(0,0,400,500);
 pts.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,6,0,6.28);
  ctx.fillStyle="white";
  ctx.fill();
 });

 if(cur>0){
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<cur;i++){
   ctx.lineTo(pts[i].x,pts[i].y);
  }
  ctx.strokeStyle="white";
  ctx.stroke();
 }
}

/* ⭐ إنهاء */
function finishStars(){

 document.getElementById("song").style.display="block";
 document.getElementById("stars").style.display="none";

 let b2=document.getElementById("b2");
 b2.classList.add("active");
 b2.onclick=()=>openScreen(2);

 openScreen(2);
}

/* 🎂 */
function checkBday(){
 if(document.getElementById("bday").value.includes("1")){
  let b3=document.getElementById("b3");
  b3.classList.add("active");
  b3.onclick=()=>openScreen(3);
  openScreen(3);
 }
}

/* 👤 */
function checkName(){
 let v=document.getElementById("name").value.toLowerCase();

 if(v.includes("سيف")||v.includes("seif")||v.includes("saif")){
  let b4=document.getElementById("b4");
  b4.classList.add("active");
  b4.onclick=()=>openScreen(4);
  openScreen(4);
 }else{
  alert("wrong 👀");
 }
}

/* 🫀 */
let heart,drag=false,started=false,time=10;

function initHeart(){
 heart=document.getElementById("heart");

 heart.onmousedown=()=>{
  drag=true;
  if(!started){
   startTimer();
   started=true;
  }
 };

 document.onmouseup=()=>drag=false;

 document.onmousemove=(e)=>{
  if(drag){
   heart.style.left=e.clientX+"px";
   heart.style.top=e.clientY+"px";
  }
 };
}

function startTimer(){
 let int=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText=time;

  if(time<=0){
   clearInterval(int);

   let b5=document.getElementById("b5");
   b5.classList.add("active");
   b5.onclick=()=>openScreen(5);

   openScreen(5);
  }
 },1000);
}

function next6(){
 let b6=document.getElementById("b6");
 b6.classList.add("active");
 b6.onclick=()=>openScreen(6);
 openScreen(6);
}

function next7(){
 let b7=document.getElementById("b7");
 b7.classList.add("active");
 b7.onclick=()=>openScreen(7);
 openScreen(7);
}

/* 💌 الرسالة */
function yes(){
 document.body.innerHTML="<div id='msg' style='padding:20px;max-width:700px;margin:auto;line-height:2'></div>";

 let msg=`بما انك اخترت ”ايوة“، فا ديه هتبقى هابي ماسدج عسولة زيك، ليككك مش لحد غيرك ❤️

بجد أنا معرفش، انت الوحيد اللي أنا بتعب عشانه وبحاول افرحه، لأن بجد فرحتك بتفرحني اوي، أنا ساعات بخاف اني اكون ببذل جهد ملهوش اي لازمة او شيء لا يذكر يعني ومش بيفرحك، فا بحاول يعني اعمل اي حاجة أنا بعرف اعملها، أنا عملتلك الويب ده مخصوص عشان اعبرلك عن مشاعري فيه، قعدت فالويب ده كتير فشخ بس والله فداك، ياسيوفتيتيتيتيتي انت بجد تستحق كل حاجة جميلة، أنا بجد مكنتش اعرف أنا ازاي عايشة منغير ما كنت اعرف انسان كتكوت زيك بجد؟؟؟؟، انا اصلا مستغربة فشخ أن في ناس بتسيبك، دول ناس ناقصة عقل والله ومرضى، هما بس عشان شايفينك مختلف عنهم، ببكييي بجددد انت الطف حد أنا شوفته فحياتي كلها، اوعدك اني هفضل معاك دايمًا وزي ما قولتلك فالاول together in death، عمري ماهسيبك، كل لحظة بيننا بجد عسولة اوي وانا فرحانة انك كملت الويب لحد هناا، بجد بحب اتكلم معاك اوي ومش بحس بالوقت وهو بيعدي، بتفرحني بجد، شكلك عسول اوي ماشاء الله تبارك الرحمـٰن، وضحكتك عسولة اوي اوي اوي، كل حاجة فيك عسل بجد 

أنتَ الكمالُ إذا تجلّى نورهُ  
وإذا حضرتَ، توارى النقصُ خجلانَا  
فيك الجمالُ كأنّه متجسّدٌ  
حتى ظننتُ الحسنَ فيك أوطانَا  
لو قيلَ، صفْ معنى الكمالِ، لقلتُهُ  
وجهٌ أراكَ به، وقلبٌ ما هَوانَا، يا سيفُ قلبي، أترىٰ هيامي ؟

كتبت الشِعر ده ليك بجد كتعبير، أنا يمكن مهاراتي قلت شوية فالشِعر بس حاولت عشانك، بجد ربنا يديمك ليا بجد انت مش متخيل فرحتي بجد وانت معايا، بحب اشاركك كل حاجة بجد ومش بحس اني تافهة وبحب كونك بتفهمني وبتشاركني تفاهتي، حرفيًا انت انا بس الفرق انك ولد وأنا بنت، أنا بجد محظوظة اوي انك فحياتي 3>.`;

 let i=0;
 let el=document.getElementById("msg");

 let int=setInterval(()=>{
  el.innerHTML+=msg[i];
  i++;
  if(i>=msg.length) clearInterval(int);
 },20);
}

</script>

</body>
</html>
